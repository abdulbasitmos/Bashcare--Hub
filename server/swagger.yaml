openapi: 3.0.0
info:
  title: BashCare Hub API
  description: API documentation for the BashCare Hub healthcare management system.
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        name: { type: string }
        role: { type: string, enum: [patient, doctor, admin, officer] }
        status: { type: string }
    Doctor:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        specialty: { type: string }
        status: { type: string }
    Appointment:
      type: object
      properties:
        id: { type: string }
        patientId: { type: string }
        doctorId: { type: string }
        date: { type: string, format: date-time }
        status: { type: string }
    Notification:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        message: { type: string }
        read: { type: boolean }

security:
  - bearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: Server is healthy
  
  /auth/register:
    post:
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string }
                password: { type: string }
                name: { type: string }
                role: { type: string }
      responses:
        '201':
          description: User registered successfully
  
  /auth/login:
    post:
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Login successful

  /users:
    get:
      summary: Get all users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }
    post:
      summary: Create or update a user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/User' }
      responses:
        '201':
          description: User saved

  /doctors:
    get:
      summary: Get all doctors
      responses:
        '200':
          description: List of doctors
    post:
      summary: Create a doctor
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Doctor' }
      responses:
        '201':
          description: Doctor created

  /appointments:
    get:
      summary: Get all appointments
      responses:
        '200':
          description: List of appointments
    post:
      summary: Book an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Appointment' }
      responses:
        '201':
          description: Appointment booked

  /appointments/patient/{patientId}:
    get:
      summary: Get appointments for a patient
      parameters:
        - name: patientId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of patient appointments

  /appointments/doctor/{doctorId}:
    get:
      summary: Get appointments for a doctor
      parameters:
        - name: doctorId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of doctor appointments

  /notifications/user/{userId}:
    get:
      summary: Get notifications for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of notifications
